<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FraudGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">🛡️</div>
      <h1 class="text-4xl font-bold text-blue-400">FraudGuard</h1>
      <p class="text-slate-400 mt-2">AI-powered scam protection</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8">
      <h2 class="text-2xl font-bold text-white mb-6 text-center">Welcome Back</h2>

      {% if error %}
      <div class="bg-red-900 border border-red-700 text-red-300 rounded-xl p-3 mb-5 text-sm text-center">
        ⚠️ {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-4">
          <label class="block text-slate-400 text-sm mb-2">Email Address</label>
          <input type="text" name="email" placeholder="you@example.com"
            class="w-full bg-slate-900 border border-slate-600 rounded-xl p-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 text-lg">
        </div>

        <div class="mb-6">
          <label class="block text-slate-400 text-sm mb-2">Password</label>
          <input type="password" name="password" placeholder="Enter your password"
            class="w-full bg-slate-900 border border-slate-600 rounded-xl p-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 text-lg">
        </div>

        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg transition-all">
          🔐 Login
        </button>
      </form>

      <p class="text-center text-slate-400 mt-6">
        Don't have an account?
        <a href="/register" class="text-blue-400 hover:underline font-medium">Register here</a>
      </p>
    </div>

  </div>
</body>
</html>
