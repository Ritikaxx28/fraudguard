<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .risk-bar { transition: width 0.8s ease; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-2">🛡️</div>
      <h1 class="text-4xl font-bold text-blue-400">FraudGuard</h1>
      <p class="text-slate-400 text-lg mt-1">AI-powered scam protection</p>
      <p class="text-slate-500 text-sm mt-2">
        Logged in as: <span class="text-blue-400 font-medium">{{ email }}</span>
        &nbsp;|&nbsp;
        <a href="/logout" class="text-red-400 hover:underline">Logout</a>
        &nbsp;|&nbsp;
        <a href="/history" class="text-blue-400 hover:underline">History</a>
      </p>
    </div>

    <!-- Input Card -->
    <div class="card rounded-2xl p-6 mb-6">
      <h2 class="text-xl font-semibold mb-4 text-white">Paste suspicious content here</h2>

      <!-- Type Selector -->
      <div class="flex gap-3 mb-4">
        <button onclick="setType('message')" id="btn-message"
          class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white">
          📱 SMS / WhatsApp
        </button>
        <button onclick="setType('email')" id="btn-email"
          class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300">
          📧 Email
        </button>
        <button onclick="setType('link')" id="btn-link"
          class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300">
          🔗 Link
        </button>
      </div>

      <textarea id="inputText" rows="5"
        placeholder="Paste your SMS, email, or suspicious link here..."
        class="w-full bg-slate-800 border border-slate-600 rounded-xl p-4 text-white placeholder-slate-500 resize-none focus:outline-none focus:border-blue-500 text-lg"></textarea>

      <button onclick="analyzeText()"
        class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg transition-all">
        🔍 Check for Scam
      </button>
    </div>

    <!-- Loading -->
    <div id="loading" style="display:none" class="text-center py-8">
      <div class="text-4xl mb-3">🤖</div>
      <p class="text-slate-400 text-lg">AI is analyzing your message...</p>
    </div>

    <!-- Result Card -->
    <div id="resultCard" style="display:none" class="card rounded-2xl p-6 mb-6">

      <!-- Verdict Banner -->
      <div id="verdictBanner" class="rounded-xl p-5 mb-5 text-center">
        <div id="verdictEmoji" class="text-6xl mb-2"></div>
        <div id="verdictText" class="text-3xl font-bold"></div>
      </div>

      <!-- Risk Score -->
      <div class="mb-5">
        <div class="flex justify-between text-sm text-slate-400 mb-2">
          <span>Risk Score</span>
          <span id="scoreLabel" class="font-bold text-white text-lg"></span>
        </div>
        <div class="h-5 bg-slate-700 rounded-full overflow-hidden">
          <div id="riskBar" class="risk-bar h-full rounded-full" style="width:0%"></div>
        </div>
      </div>

      <!-- Explanation -->
      <div class="bg-slate-800 rounded-xl p-4 mb-4">
        <p class="text-sm text-slate-400 mb-1 font-medium">📋 What this means:</p>
        <p id="explanation" class="text-white text-lg"></p>
      </div>

      <!-- Tamil -->
      <div id="tamilBox" style="display:none" class="bg-slate-800 rounded-xl p-4 mb-4">
        <p class="text-sm text-slate-400 mb-1 font-medium">🗣️ தமிழில் (Tamil):</p>
        <p id="explanationTamil" class="text-white text-lg"></p>
      </div>

      <!-- Scam Type -->
      <div id="scamTypeBox" style="display:none" class="bg-slate-800 rounded-xl p-4 mb-4">
        <p class="text-sm text-slate-400 mb-1 font-medium">🎭 Scam Type:</p>
        <p id="scamType" class="text-yellow-300 text-lg font-medium"></p>
      </div>

      <!-- Red Flags -->
      <div id="flagsBox" style="display:none" class="bg-slate-800 rounded-xl p-4 mb-4">
        <p class="text-sm text-slate-400 mb-2 font-medium">🚩 Red Flags Found:</p>
        <ul id="flagsList" class="space-y-2"></ul>
      </div>

      <!-- Safety Advice -->
      <div id="adviceBox" style="display:none"
        class="bg-green-900 border border-green-700 rounded-xl p-4 mb-4">
        <p class="text-sm text-green-400 mb-1 font-medium">✅ What to do:</p>
        <p id="safetyAdvice" class="text-green-100 text-lg"></p>
      </div>

      <!-- Audio -->
      <div id="audioBox" style="display:none" class="bg-slate-800 rounded-xl p-4 mb-4">
        <p class="text-sm text-slate-400 mb-2 font-medium">🔊 Voice Alert:</p>
        <audio id="audioPlayer" controls class="w-full"></audio>
      </div>

      <!-- Family Button -->
      <button onclick="askFamily()" id="familyBtn" style="display:none"
        class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl text-lg transition-all mt-2">
        👨‍👩‍👧 Ask Family Member (Share on WhatsApp)
      </button>

      <!-- Scan Again -->
      <button onclick="resetForm()"
        class="w-full bg-slate-700 hover:bg-slate-600 text-white font-medium py-3 rounded-xl mt-3 transition-all">
        🔄 Scan Another Message
      </button>

    </div>

  </div>

  <script>
    let selectedType = 'message';
    let currentResult = null;

    function setType(type) {
      selectedType = type;
      ['message','email','link'].forEach(t => {
        const btn = document.getElementById('btn-' + t);
        if (t === type) {
          btn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white';
        } else {
          btn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300';
        }
      });
    }

    async function analyzeText() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) { alert('Please paste some text first.'); return; }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';

      try {
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text, type: selectedType })
        });

        if (!response.ok) {
          const err = await response.text();
          alert('Server error: ' + response.status);
          document.getElementById('loading').style.display = 'none';
          return;
        }

        const data = await response.json();
        currentResult = data;
        document.getElementById('loading').style.display = 'none';
        showResult(data);

      } catch(e) {
        alert('Error: ' + e.message);
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showResult(data) {
      // Reset all boxes
      ['tamilBox','scamTypeBox','flagsBox','adviceBox','audioBox','familyBtn'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });

      document.getElementById('resultCard').style.display = 'block';

      const score = data.risk_score;
      const verdict = data.verdict;
      const banner = document.getElementById('verdictBanner');
      const emoji = document.getElementById('verdictEmoji');
      const text = document.getElementById('verdictText');

      if (verdict === 'SCAM') {
        banner.style.cssText = 'background:rgba(127,29,29,0.5);border:2px solid #b91c1c;border-radius:0.75rem;padding:1.25rem;margin-bottom:1.25rem;text-align:center';
        emoji.textContent = '⛔';
        text.textContent = 'THIS IS A SCAM!';
        text.style.color = '#f87171';
      } else if (verdict === 'SUSPICIOUS') {
        banner.style.cssText = 'background:rgba(120,53,15,0.5);border:2px solid #b45309;border-radius:0.75rem;padding:1.25rem;margin-bottom:1.25rem;text-align:center';
        emoji.textContent = '⚠️';
        text.textContent = 'SUSPICIOUS — Be Careful!';
        text.style.color = '#fbbf24';
      } else {
        banner.style.cssText = 'background:rgba(20,83,45,0.5);border:2px solid #15803d;border-radius:0.75rem;padding:1.25rem;margin-bottom:1.25rem;text-align:center';
        emoji.textContent = '✅';
        text.textContent = 'LOOKS SAFE';
        text.style.color = '#4ade80';
      }

      // Risk bar
      const bar = document.getElementById('riskBar');
      bar.style.background = score >= 70 ? '#ef4444' : score >= 40 ? '#eab308' : '#22c55e';
      setTimeout(() => { bar.style.width = score + '%'; }, 100);
      document.getElementById('scoreLabel').textContent = score + ' / 100';

      // Explanation
      document.getElementById('explanation').textContent = data.explanation;

      // Tamil
      if (data.explanation_tamil) {
        document.getElementById('explanationTamil').textContent = data.explanation_tamil;
        document.getElementById('tamilBox').style.display = 'block';
      }

      // Scam type
      if (data.scam_type && data.scam_type !== 'Not a scam') {
        document.getElementById('scamType').textContent = data.scam_type;
        document.getElementById('scamTypeBox').style.display = 'block';
      }

      // Red flags
      if (data.red_flags && data.red_flags.length > 0) {
        const list = document.getElementById('flagsList');
        list.innerHTML = data.red_flags.map(f =>
          `<li style="color:#fca5a5;font-size:0.95rem;display:flex;gap:8px"><span>🔸</span><span>${f}</span></li>`
        ).join('');
        document.getElementById('flagsBox').style.display = 'block';
      }

      // Safety advice
      if (data.safety_advice) {
        document.getElementById('safetyAdvice').textContent = data.safety_advice;
        document.getElementById('adviceBox').style.display = 'block';
      }

      // Audio
      if (data.audio_file) {
        document.getElementById('audioPlayer').src = data.audio_file;
        document.getElementById('audioBox').style.display = 'block';
      }

      // Family button
      if (verdict !== 'SAFE') {
        document.getElementById('familyBtn').style.display = 'block';
      }

      // Scroll to result
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('inputText').value = '';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function askFamily() {
      if (!currentResult) return;
      const msg = `⚠️ FraudGuard Alert!\n\nRisk Score: ${currentResult.risk_score}/100\nVerdict: ${currentResult.verdict}\n\n${currentResult.explanation}\n\nAdvice: ${currentResult.safety_advice}`;
      window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
    }
  </script>
</body>
</html>
